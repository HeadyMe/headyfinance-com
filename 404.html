<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — HeadyFinance</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://headyfinance.com/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #0a0a0f;
      --color-text: #e4e4e7;
      --color-text-muted: #a1a1aa;
      --color-accent: #a855f7;
      --color-border: rgba(255,255,255,0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(168,85,247,0.12), transparent),
        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(139,92,246,0.04), transparent);
    }
    .error-code {
      font-size: clamp(4rem, 15vw, 10rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--color-accent), #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: clamp(1.25rem, 4vw, 1.75rem);
      font-weight: 600;
      margin-bottom: 0.75rem;
    }
    p {
      color: var(--color-text-muted);
      max-width: 400px;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 1.75rem;
      background: var(--color-accent);
      color: white;
      text-decoration: none;
      border-radius: 0.75rem;
      font-weight: 600;
      transition: all 0.2s ease;
    }
    a:hover {
      background: #9333ea;
      transform: translateY(-2px);
    }
    a svg {
      width: 18px;
      height: 18px;
    }
  </style>
</head>
<body>
  <div class="error-code">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or has been moved. Return to the investor relations portal.</p>
  <a href="/">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    Back to Home
  </a>
</body>
</html>
